<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Zoom Optique | Luxe & Précision</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gris-noir: #1a1a1a;
            --orange-luxe: #ff6600;
            --blanc: #ffffff;
            --gris-clair: #f8f9fa;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--blanc); color: var(--gris-noir); overflow-x: hidden; }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        /* --- NAVIGATION LUXE --- */
        header { position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--orange-luxe); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--gris-noir); text-decoration: none; }
        .logo span { color: var(--orange-luxe); }
        .nav-links a { text-decoration: none; color: var(--gris-noir); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; margin-left: 25px; transition: var(--transition); }
        .nav-links a:hover { color: var(--orange-luxe); }

        /* --- HERO SECTION --- */
        .hero { 
            height: 85vh; margin-top: 60px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('clario-20.png.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .btn-luxe { border: 2px solid var(--orange-luxe); color: white; padding: 15px 40px; text-decoration: none; font-weight: 700; transition: var(--transition); text-transform: uppercase; }
        .btn-luxe:hover { background: var(--orange-luxe); }

        /* --- COLLECTION DYNAMIQUE --- */
        .section { padding: 80px 8%; text-align: center; }
        .section-title { font-size: 2.8rem; margin-bottom: 50px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .card { background: var(--gris-clair); padding: 25px; border-radius: 4px; transition: var(--transition); border-bottom: 3px solid transparent; }
        .card:hover { transform: translateY(-10px); border-color: var(--orange-luxe); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: contain; }
        .card h3 { margin-top: 15px; font-size: 1.2rem; }

        /* --- FORMULAIRE RDV WHATSAPP --- */
        .rdv-section { background: var(--gris-noir); color: white; padding: 80px 8%; }
        .form-container { max-width: 700px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; font-family: 'Inter'; border-radius: 4px; }
        input:focus { outline: none; border-color: var(--orange-luxe); }
        .btn-submit { grid-column: span 2; background: var(--orange-luxe); color: white; border: none; padding: 20px; font-weight: 900; cursor: pointer; font-size: 1rem; letter-spacing: 2px; transition: var(--transition); }
        .btn-submit:hover { background: white; color: var(--gris-noir); }

        /* --- CHATBOT CLIGNOTANT --- */
        .chat-container { position: fixed; bottom: 30px; left: 30px; z-index: 2000; }
        .chat-bubble { 
            width: 65px; height: 65px; background: var(--orange-luxe); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 1.8rem; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: pulse-orange 2s infinite;
        }
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(255, 102, 0, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0); transform: scale(1); }
        }

            position: absolute; bottom: 80px; left: 0; width: 300px; background: white;
